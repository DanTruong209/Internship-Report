baseURL = "https://dantruong209.github.io/Internship-Report/"
relativeURLs = false
canonifyURLs = true
defaultContentLanguage = "en"

# Hugo theme
theme = "hugo-theme-learn"

# Search functionality
[outputs]
home = ["HTML", "RSS", "JSON"]


[params]
  # Theme color
  themeVariant = "workshop"

  # GitHub repository edit link
  editURL = "https://github.com/DanTruong209/Internship-Report/edit/main/"

  description = "Internship Report - First Cloud AI Journey"
  author = "nguyendantruong12a9@gmail.com"

  showVisitedLinks = true
  disableBreadcrumb = false
  disableNextPrev = false


# =========================
# English Language
# =========================

[Languages]

[Languages.en]
title = "Internship Report"
weight = 1
languageName = "English"


[[Languages.en.menu.shortcuts]]
name = "<i class='fab fa-aws'></i> AWS Study Group - Blog"
identifier = "AWS Study Group"
url = "https://awsstudygroup.com"
weight = 20


